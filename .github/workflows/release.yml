name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Install Linux Rollup native package
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Check
        run: npm run check

      - name: Test composer-layout
        run: npm run test --workspace composer-layout

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --workspace composer-layout --access public
