name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build package
        run: npm run build --workspace composer-layout

      - name: Publish to npm
        run: npm publish --workspace composer-layout --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
