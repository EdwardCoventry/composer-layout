[build]
command = "npm install --no-save --include=optional @rollup/rollup-linux-x64-gnu@$(node -p \"require('rollup/package.json').version\") && npm run build"
publish = "apps/showcase/dist"

[build.environment]
NODE_VERSION = "22.18.0"
NPM_FLAGS = "--include=optional"

[[redirects]]
from = "/apps/composer-layout"
to = "/"
status = 200
force = true

[[redirects]]
from = "/apps/composer-layout/*"
to = "/:splat"
status = 200
force = true

[[redirects]]
from = "/chat-messages"
to = "/chat-messages-example/"
status = 200
force = true

[[redirects]]
from = "/chat-messages/"
to = "/chat-messages-example/"
status = 200
force = true

[[redirects]]
from = "/chat-messages/*"
to = "/chat-messages-example/:splat"
status = 200
force = true

[[redirects]]
from = "/ai-assistant"
to = "/ai-assistant-example/"
status = 200
force = true

[[redirects]]
from = "/ai-assistant/"
to = "/ai-assistant-example/"
status = 200
force = true

[[redirects]]
from = "/ai-assistant/*"
to = "/ai-assistant-example/:splat"
status = 200
force = true

[[redirects]]
from = "/quiz"
to = "/quiz-app-example/"
status = 200
force = true

[[redirects]]
from = "/quiz/"
to = "/quiz-app-example/"
status = 200
force = true

[[redirects]]
from = "/quiz/*"
to = "/quiz-app-example/:splat"
status = 200
force = true
